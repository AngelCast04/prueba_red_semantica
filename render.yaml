# Blueprint para Render.com — https://render.com/docs/blueprint-spec
# Un solo Web Service (Python/FastAPI): sirve la UI en / y el API en /api/* (carpeta visualizer/ incluida en el repo).
#
# Plan free: no hay Shell en Render, asi que la ingesta corre en buildCommand.
# Requiere OPENAI_API_KEY en el servicio (disponible en build) y PDFs en libros/.

services:
  - type: web
    name: redes-semanticas-dh
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && python run_quickstart.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: GRAPH_WORKING_DIR
        value: ./grafo_libros
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CONCURRENT_TASK_LIMIT
        value: "4"

