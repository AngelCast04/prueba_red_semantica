services:
  backend:
    build:
      context: .
      dockerfile: python_backend/Dockerfile
    container_name: fast-graphrag-backend
    restart: unless-stopped
    environment:
      PORT: "8000"
      GRAPH_WORKING_DIR: ./grafo_libros
      CONCURRENT_TASK_LIMIT: "4"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    expose:
      - "8000"
    networks:
      - private_net
    # Reglas de seguridad para backend Python
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 1g
    cpus: "1.0"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fast-graphrag-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - private_net
    # Reglas de seguridad para Nginx
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    pids_limit: 100
    mem_limit: 256m
    cpus: "0.50"
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /var/run:rw,noexec,nosuid,size=16m
      - /var/log/nginx:rw,noexec,nosuid,size=32m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  private_net:
    driver: bridge
